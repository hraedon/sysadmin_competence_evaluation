name: Build and push assessment app

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push assessment app
        uses: docker/build-push-action@v6
        with:
          context: .
          file: platform/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
      - name: Build and push lab controller
        uses: docker/build-push-action@v6
        with:
          context: .
          file: platform/lab-controller/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-lab-controller:latest
            ghcr.io/${{ github.repository }}-lab-controller:${{ github.sha }}
