name: Build and push assessment app

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push assessment app
        uses: docker/build-push-action@v6
        with:
          context: .
          file: platform/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
      - name: Build and push lab controller
        uses: docker/build-push-action@v6
        with:
          context: .
          file: platform/lab-controller/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-lab-controller:latest
            ghcr.io/${{ github.repository }}-lab-controller:${{ github.sha }}

      - name: Update image tags in k8s manifests
        run: |
          sed -i "s|ghcr.io/${{ github.repository }}-lab-controller:[a-f0-9]*|ghcr.io/${{ github.repository }}-lab-controller:${{ github.sha }}|g" platform/k8s/lab-controller-deployment.yaml
          sed -i "s|ghcr.io/${{ github.repository }}:[a-f0-9]*|ghcr.io/${{ github.repository }}:${{ github.sha }}|g" platform/k8s/deployment.yaml

      - name: Commit updated image tags
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add platform/k8s/lab-controller-deployment.yaml platform/k8s/deployment.yaml
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ github.sha }} [skip ci]"
          git push
