server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — unknown paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Scenario files served as static assets
    location /scenarios/ {
        add_header Cache-Control "public, max-age=3600";
    }

    # Manifest — no caching so updates are seen immediately
    location /scenarios-manifest.json {
        add_header Cache-Control "no-store";
    }

    # LLM Proxy — bridge to local AI without exposing internal IP to browser
    # Usage: configure the app to hit "/llm-proxy/v1"
    location /llm-proxy/ {
        # Optional: Credential verification (uncomment and replace "your-secret-key" to enable)
        # if ($http_authorization != "Bearer your-secret-key") {
        #     return 401;
        # }

        proxy_pass http://192.168.1.28:1234/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering for streaming responses
        proxy_buffering off;
        proxy_cache off;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
