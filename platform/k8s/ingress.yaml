---
# ExternalName service to route from assessment namespace to lab-controller namespace
apiVersion: v1
kind: Service
metadata:
  name: lab-controller-proxy
  namespace: assessment
spec:
  type: ExternalName
  externalName: lab-controller.lab-controller.svc.cluster.local
  ports:
    - port: 8000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: assessment
  namespace: assessment
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik-external
  rules:
    - host: learning.hraedon.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: lab-controller-proxy
                port:
                  number: 8000
          - path: /lab
            pathType: Prefix
            backend:
              service:
                name: lab-controller-proxy
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: assessment
                port:
                  name: http
  tls:
    - hosts:
        - learning.hraedon.com
      secretName: learning-tls
