apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab-controller
  namespace: lab-controller
  labels:
    app: lab-controller
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: lab-controller
  template:
    metadata:
      labels:
        app: lab-controller
    spec:
      containers:
        - name: lab-controller
          image: ghcr.io/hraedon/sysadmin_competence_evaluation-lab-controller:521177c7ce85fc568a5d1c219ab8ec879bc7ffc7
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
          env:
            - name: GUACAMOLE_URL
              valueFrom:
                secretKeyRef:
                  name: lab-controller-secret
                  key: GUACAMOLE_URL
            - name: GUACAMOLE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: lab-controller-secret
                  key: GUACAMOLE_USERNAME
            - name: GUACAMOLE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lab-controller-secret
                  key: GUACAMOLE_PASSWORD
            - name: HYPERV_HOST
              valueFrom:
                secretKeyRef:
                  name: lab-controller-secret
                  key: HYPERV_HOST
            - name: HYPERV_USERNAME
              valueFrom:
                secretKeyRef:
                  name: lab-controller-secret
                  key: HYPERV_USERNAME
            - name: HYPERV_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lab-controller-secret
                  key: HYPERV_PASSWORD
            - name: HYPERV_GUEST_USERNAME
              valueFrom:
                secretKeyRef:
                  name: lab-controller-secret
                  key: HYPERV_GUEST_USERNAME
            - name: HYPERV_GUEST_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lab-controller-secret
                  key: HYPERV_GUEST_PASSWORD
            - name: CONTROLLER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: lab-controller-secret
                  key: CONTROLLER_API_KEY
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: lab-controller-secret
                  key: anthropic_api_key
            - name: DRY_RUN
              value: "False"
            - name: SQLALCHEMY_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: lab-controller-secret
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: lab-controller-secret
                  key: JWT_SECRET
