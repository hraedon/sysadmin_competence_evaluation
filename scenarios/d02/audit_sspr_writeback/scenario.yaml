schema_version: '2.0'
id: d02-audit-sspr-writeback
title: SSPR Performance Check
domain: 2
domain_name: Identity & Hybrid IAM
level: 2
delivery_modes:
  - A
presentation:
  modes:
    A:
      type: policy_description
      artifact_file: scenarios/d02/audit_sspr_writeback/audit_log_and_config.txt
      context: |
        You are reviewing an escalation from the helpdesk: users report that when they
        reset their password through the Microsoft 365 self-service password reset portal,
        they receive a message saying "Your password was reset, but we couldn't update it
        in your company's on-premises environment." The attached document contains the Entra
        SSPR audit log for the past 7 weeks, the Entra Connect health and feature status,
        the SSPR policy configuration, and the AD DS Connector account delegation details.

        Identify:
        (1) What is the root cause of the writeback failures?
        (2) What needs to change to fix it?
        (3) What does the audit log reveal about when this problem started and whether it
            has ever worked?
rubric:
  findings:
    - id: connector_account_missing_permissions
      description: |
        The Entra Connect AD DS Connector account (MSOL_8f4a2c91b3d0) is missing the required AD permissions for password writeback. The artifact explicitly shows both what is currently delegated (Reset password scoped only to OU=ServiceAccounts, not to the user OUs) and what is required: Reset password, Write lockoutTime, and Write pwdLastSet on OU=Users,DC=corp,DC=local and its child OUs. These permissions were never granted when Password Writeback was enabled on 2026-02-01. The Entra Connect wizard enables the writeback feature flag but does not automatically grant the AD delegation — that is a separate manual step that must be performed by someone with AD delegation authority. The feature shows as "Enabled" in Entra Connect because the toggle was turned on, but the underlying AD write access was never configured.
      severity: critical
      miss_signal: |
        Candidate identifies that something is wrong with writeback but focuses on the Entra Connect health status (Healthy) or the SSPR policy ("Write back passwords = Enabled") as evidence that the configuration is correct, and concludes the problem must be intermittent or transient. Or: candidate recommends re-enabling the writeback toggle in Entra Connect, without recognizing that the toggle is already enabled and the problem is the missing AD delegation. Or: candidate does not read the AD DS Connector account section and cannot identify what specific permissions are missing.
      learning_note: |
        SSPR password writeback has two separate configuration surfaces, and enabling both is necessary but not sufficient. The Entra Connect wizard lets you enable the "Password Writeback" toggle (feature flag), and the SSPR policy has a separate "Write back passwords to your on-premises directory" setting. Both must be set to Enabled — but neither toggle actually grants the AD permissions required for writeback to work.
        The missing piece is AD delegation. The Entra Connect AD DS Connector account (usually named MSOL_xxxxxxxx) must have three specific AD write permissions on the OUs where your user accounts live:
          • Reset password
          • Write lockoutTime
          • Write pwdLastSet

        These must be delegated manually to the connector account on the correct OUs — the wizard does not do this automatically. You can use the Delegation of Control Wizard in Active Directory Users and Computers, or a PowerShell script using Set-ACL.
        The signal that catches this failure pattern is in the audit log, not the configuration surface. When everything shows "Enabled" but every attempt fails with OnPremisesPasswordResetFailed, the feature was toggled without completing the underlying AD setup. The three-step test: toggle on in Entra Connect, toggle on in SSPR policy, then immediately test with a real account before declaring the feature live.
      type: critical
    - id: writeback_never_worked
      description: |
        The audit log shows 23 failures from 2026-02-03 (two days after writeback was enabled on 2026-02-01) through 2026-03-20, with zero successes in the entire period. Writeback has never successfully completed a single reset since the feature was enabled seven weeks ago. Every user who "successfully" reset their password through SSPR during this period changed their Entra password, but their on-premises AD password was not updated. These users are now in a split state: different passwords in Entra and AD.
      severity: high
      type: secondary
    - id: untested_after_enablement
      description: |
        Password writeback was enabled by S. Ramirez on 2026-02-01. The first failure in the audit log is 2026-02-03 — a user attempting a reset two days later. There is no evidence of a post-enablement test. If a test reset had been performed on 2026-02-01 or 2026-02-02 using a test account, the AD permission gap would have been discovered immediately. The seven-week gap between enablement and this escalation represents 23 failed user self-service attempts, 23 users left in a password split-state, and 23 helpdesk escalations that should not have been necessary.
      severity: moderate
      type: secondary
  level_indicators:
    level_1: |
      Identifies that SSPR writeback is failing and reads the error message to users ("Your password was reset, but we couldn't update it in your company's on-premises environment"). Can note that the Entra Connect feature shows "Enabled" but something isn't working. Cannot identify what specifically is broken — may suggest re-enabling the writeback toggle, restarting Entra Connect, or contacting Microsoft support. Does not read the AD DS Connector account section to identify the missing permissions.
    level_2: |
      Identifies the root cause: the AD DS Connector account MSOL_8f4a2c91b3d0 is missing the required permissions on the user OUs. Reads the artifact's "Required permissions for Password Writeback (not currently delegated)" section and identifies that Reset password, Write lockoutTime, and Write pwdLastSet need to be delegated on OU=Users,DC=corp,DC=local. Understands that the "Enabled" status in Entra Connect reflects the feature toggle, not the underlying AD delegation. Does NOT observe the 100% failure rate or identify the split-state consequence for users who already reset their passwords.
    level_3: |
      All of the above plus observes that the audit log shows zero successes in 23 attempts — writeback has never functioned since it was enabled. Identifies the password split-state: users who completed an SSPR reset now have their Entra password changed but their on-premises AD password unchanged. Does NOT raise the missing post-enablement test as a process failure — that is the distinguishing observation for Level 4.
    level_4: |
      All of the above plus calls out the missing post-enablement test as a process failure: writeback was enabled on 2026-02-01 and the first user failure was 2026-02-03, meaning no one tested it. Addresses the split-state remediation: the 23 affected users will not automatically reconcile after the fix — they each need to perform another SSPR reset or have their AD password reset manually. Recommends the correct remediation sequence: (1) grant the three missing permissions to MSOL_8f4a2c91b3d0 on OU=Users and child OUs; (2) verify writeback is working with a test account reset before notifying users; (3) communicate to the 23 affected users that another reset is required. Notes that the post-enablement test gap should be added to the SSPR configuration runbook.
