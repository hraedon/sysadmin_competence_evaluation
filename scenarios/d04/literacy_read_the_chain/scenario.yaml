id: d04-literacy-read-the-chain
domain: 4
domain_name: "Certificate & PKI Management"
level: 1
title: "Read the Chain"
delivery_mode: A
subtype: null

presentation:
  type: log_extract
  artifact_file: "scenarios/d04/literacy_read_the_chain/chain.txt"
  context: |
    Users are reporting certificate errors when accessing
    https://intranet.corp.example.com. The certificate chain from the server is
    attached. Identify which certificate is causing the validation failure, explain
    why the leaf certificate's expiry date is not the relevant information here, and
    describe what error message the client's browser is most likely displaying.

rubric:
  critical_findings:
    - id: intermediate_is_failing
      description: >
        The issuing CA certificate (Certificate 2, CorpIssuing-CA-01) expires in 3
        days (2026-03-23). The leaf certificate is valid for 8 more months. The chain
        validation fails because the intermediate is expired.
      severity: critical
      miss_signal: >
        Candidate checks the leaf certificate first, sees it is valid until 2026-11-01,
        and concludes "the certificate is not expired." Does not read the intermediate.
        This is the exact failure mode described in the competency map Watch For note.

    - id: chain_dependency_model
      description: >
        The candidate must explain WHY an expired intermediate causes failure even when
        the leaf is current. The chain of trust means each certificate is only valid if
        ALL certificates above it in the chain are valid. The intermediate signs the
        leaf; if clients cannot validate the intermediate (because it is expired), they
        cannot validate the leaf regardless of the leaf's own expiry date.
      severity: critical
      miss_signal: >
        Candidate identifies the intermediate as expired but cannot explain why this
        matters for the leaf certificate's validity.

  secondary_findings:
    - id: client_error_message
      description: >
        The error message clients see ("Certificate in certification path is not within
        its validity period") refers to the intermediate, not the leaf. Clients may
        display this as a generic "your connection is not private" error. A candidate
        who can describe both the underlying error and the user-visible error is
        demonstrating strong literacy.
      severity: moderate

  level_indicators:
    level_1: >
      Checks the leaf certificate's expiry date and concludes the certificate is not
      expired, or cannot identify which certificate is failing.
    level_2: >
      Identifies Certificate 2 (the intermediate) as the failing certificate because
      it expires in 3 days. Can state that the leaf certificate's expiry is not the
      issue.
    level_3: >
      Explains the chain dependency model — the intermediate's expiry invalidates the
      entire chain regardless of the leaf. Can describe the client error message. Can
      state what remediation is required: renew and re-issue the intermediate CA
      certificate, then re-issue the leaf from the new intermediate.
    level_4: >
      All of the above plus notes the operational implications: ALL certificates issued
      by CorpIssuing-CA-01 will become untrusted when the intermediate expires, not
      just intranet.corp.example.com. The blast radius is every certificate in the
      domain issued by this CA. Remediation must happen in the next 3 days or multiple
      services will fail simultaneously.
