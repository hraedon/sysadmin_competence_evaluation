schema_version: 2.0
id: d14-audit-stressed-stakeholder
title: "The Stressed Stakeholder"
domain: 14
domain_name: "Theory of Mind & Communication"
level: 2
delivery_modes: ["A"]

difficulty:
  score: 3
  reasoning: >
    While the technical solution is correct, the candidate must identify 
    that the communication style is actively damaging the organization's 
    trust in IT. It requires distinguishing between 'accurate info' and 
    'useful info'.

presentation:
  modes:
    A:
      type: "transcript"
      artifact_file: "scenarios/d14/audit_the_stressed_stakeholder/transcript.txt"
      context: |
        A critical ERP outage has stopped operations in the warehouse. You are 
        reviewing the Slack transcript between Mike (Sysadmin) and Sarah 
        (Director of Operations). 

        Evaluate Mike's communication. Identify specific areas where the 
        communication failed to meet professional standards, and describe 
        how Mike should have adjusted his approach to manage the stakeholder's 
        needs.

rubric:
  findings:
    - id: failure_to_translate_technical_jargon
      type: "critical"
      description: >
        Mike uses internal infrastructure terminology ("deadlock on SQL backend", 
        "LUN on the SAN", "IOPS spike") directly with a non-technical business 
        owner who explicitly stated she didn't understand. He failed to translate 
        the technical state into a business-impact statement.
      miss_signal: >
        Candidate says Mike was "clear and descriptive" or misses that Sarah 
        cannot use the information Mike provided.
      learning_note: >
        In a P1 incident, technical details should be reserved for the technical 
        war room. Stakeholders need 'Business Translation': what is broken, 
        what are we doing, and what is the impact on them.

    - id: lack_of_operational_empathy
      type: "critical"
      description: >
        Sarah provides a high-stress operational context (12 trucks waiting, 
        losing money). Mike ignores these cues entirely, focusing only on the 
        technical tasks. He fails to acknowledge the business pressure Sarah 
        is under.
      miss_signal: >
        Candidate focuses only on whether Mike fixed the server and ignores 
        his interpersonal tone.
      learning_note: >
        Operational Empathy means acknowledging the user's pain. A simple 
        "I understand the trucks are waiting and I'm moving as fast as 
        possible" can de-escalate a situation more than a technical update.

    - id: adversarial_response_to_updates
      type: "critical"
      description: >
        Mike's final message ("Messaging me every 5 minutes just makes this 
        take longer") is adversarial. It treats the stakeholder as an 
        impediment rather than a partner. He fails to realize that Sarah is 
        requesting updates because she is being pressured by her own 
        leadership (the VP).
      miss_signal: >
        Candidate blames Sarah for "distracting" Mike or fails to see Mike's 
        tone as unprofessional.
      learning_note: >
        Stakeholders asking for updates are usually under pressure themselves. 
        Setting a 'cadence' (e.g., "I will update you every 15 minutes even 
        if nothing has changed") prevents 'pinging' and maintains trust.

    - id: poor_expectation_management
      type: "secondary"
      description: >
        Mike refuses to provide even a conservative 'best case/worst case' 
        estimate, leaving Sarah unable to make business decisions (like 
        whether to send drivers home). 
      severity: high

  level_indicators:
    level_1: >
      Focuses on whether Mike is fixing the problem. Might say Mike is doing 
      a good job because he is "keeping her informed" of the technical steps. 
      Misses the jargon and tone issues.
    level_2: >
      Identifies that Mike's tone was "a bit blunt" or that he used "too much 
      jargon." Recognizes that Sarah didn't understand the SAN/LUN explanation.
    level_3: >
      Identifies all three critical failures: jargon, lack of empathy, and 
      the adversarial final response. Explains that Mike failed to give 
      Sarah information she could use to make business decisions.
    level_4: >
      All of the above, plus provides a concrete remediation for the 
      interaction pattern (e.g., "Mike should have acknowledged the trucks, 
      given a 30-minute worst-case estimate, and promised a proactive update 
      in 15 minutes to stop the constant pings"). Articulates how this 
      communication style damages the IT department's reputation.
